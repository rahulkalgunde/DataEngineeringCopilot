name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.4"
  COMPOSE_PROJECT_NAME: dec_ci

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv venv dec_venv
      - run: uv pip install -e ".[dev]"
      - run: make lint

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv venv dec_venv
      - run: uv pip install -e ".[dev]"
      - run: make test-ci-unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: .ollama_cache
          key: ollama-models-${{ runner.os }}-${{ hashFiles('docker-compose.ci.yml') }}
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Start all service dependencies (Qdrant, Redis, Ollama, Langfuse stack)
        run: docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 300

      - name: Pull Ollama models
        run: |
          docker exec de_copilot_ollama ollama pull nomic-embed-text
          docker exec de_copilot_ollama ollama pull llama3.2:3b

      - run: uv venv dec_venv
      - run: uv pip install -e ".[dev]"
      - run: make test-integration

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: .ollama_cache
          key: ollama-models-${{ runner.os }}-${{ hashFiles('docker-compose.ci.yml') }}
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Start service dependencies (Qdrant + Redis + Ollama only)
        run: docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 180 qdrant redis ollama

      - name: Pull Ollama models
        run: |
          docker exec de_copilot_ollama ollama pull nomic-embed-text
          docker exec de_copilot_ollama ollama pull llama3.2:3b

      - run: uv venv dec_venv
      - run: uv pip install -e ".[dev]"
      - run: make test-e2e
