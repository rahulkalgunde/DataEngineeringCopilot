[pytest]
markers =
    integration: marks tests that require live external services (Langfuse, Qdrant, Ollama, etc.)
    slow: marks tests that take a long time to run
    qdrant: marks tests that require a running Qdrant instance
    ollama: marks tests that require a running Ollama instance
    langfuse: marks tests that require a running Langfuse instance
    rag: marks tests that exercise the full RAG pipeline (Qdrant + Ollama)
    ingestion: marks tests that exercise the full ingestion pipeline (Qdrant + Ollama)
    api: marks tests that exercise FastAPI endpoints (may require Celery/Redis)
